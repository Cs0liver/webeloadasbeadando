    <!-- FORM -->
    <div class="form-box">
      <form onsubmit="event.preventDefault(); onFormSubmit();">
        <div>
          <label>Név *</label>
          <label class="validation-error hide" id="fullNameValidationError">Ez a mező kötelező!</label>
          <input type="text" name="fullName" id="fullName" placeholder="Pilóta neve">
        </div>
        <div>
          <label>Csapat</label>
          <input type="text" name="csapat" id="csapat" placeholder="Csapat neve">
        </div>
        <div>
          <label>Nemzetiség</label>
          <input type="text" name="city" id="city" placeholder="Nemzetiség">
        </div>
        <div class="form-action-buttons">
          <input type="submit" value="Hozzáadás">
        </div>
      </form>
    </div>

    <!-- TÁBLÁZAT -->
    <table class="list" id="employeeList">
      <thead>
        <tr>
          <th>Név</th>
          <th>Csapat</th>
          <th>Nemzetiség</th>
          <th>Műveletek</th>
        </tr>
      </thead>
